  <div class="container">

    <h1>Customer Service & Support</h1>

    <p>
        We value our customers. Please use the form below to report issues,
        ask questions, give feedback, or request assistance with your order.
    </p>

    <form>

        <!-- NAME -->
        <label>Full Name:</label><br>
        <input type="text" required><br><br>

        <!-- EMAIL -->
        <label>Email Address:</label><br>
        <input type="email" required><br><br>

        <!-- PHONE -->
        <label>Phone Number:</label><br>
        <input type="text" required><br><br>

        <!-- ORDER NUMBER -->
        <label>Order Number (if available):</label><br>
        <input type="text"><br><br>

        <!-- ISSUE TYPE -->
        <label>Select Issue Type:</label><br>

        <select required>
            <option value="">-- Select Issue --</option>

            <option>Late Delivery</option>
            <option>Wrong Order Received</option>
            <option>Missing Items</option>
            <option>Refund Request</option>
            <option>Product Quality Complaint</option>
            <option>Order Cancellation</option>
            <option>General Question</option>
            <option>Feedback</option>
        </select><br><br>

        <!-- MESSAGE -->
        <label>Explain Your Issue:</label><br>

        <textarea rows="6"
        placeholder="Please describe your issue or enquiry here..."
        required></textarea><br><br>

        <!-- SUBMIT -->
        <input type="submit" value="Submit Request">

    </form>
